<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La mia cantina</title>
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: rgba(60,40,20,0.12);
    --border2: rgba(60,40,20,0.22);
    --text: #1A1208;
    --text2: #6B5A45;
    --text3: #A8957E;
    --accent: #7B2D2D;
    --accent-light: #F5EAEA;
    --accent-text: #5A1E1E;
    --green: #2D5A3D;
    --green-light: #EBF4EE;
    --amber: #7A4F0E;
    --amber-light: #FDF3E3;
    --purple: #4A3580;
    --purple-light: #EEEAF8;
    --blue: #1A4A7A;
    --blue-light: #E8F0F8;
    --pink: #7A2A4A;
    --pink-light: #F8EAF0;
    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 1px 3px rgba(60,40,20,0.08);
    --shadow-md: 0 4px 16px rgba(60,40,20,0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #110D08; --surface: #1C160F; --surface2: #261E14;
      --border: rgba(255,220,160,0.10); --border2: rgba(255,220,160,0.20);
      --text: #F2E8D8; --text2: #B89F80; --text3: #7A6650;
      --accent: #C46060; --accent-light: #2A1414; --accent-text: #F0A0A0;
      --green: #5DC47A; --green-light: #0D2018;
      --amber: #E0A040; --amber-light: #201408;
      --purple: #9A80E0; --purple-light: #150F30;
      --blue: #60A0E0; --blue-light: #0A1828;
      --pink: #D080A0; --pink-light: #200A14;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Georgia','Times New Roman',serif; min-height: 100vh; }
  .app { max-width: 820px; margin: 0 auto; padding: 0 1rem 4rem; }
  .site-header { padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .site-title { font-size: clamp(22px,4vw,32px); font-weight: normal; letter-spacing: -0.5px; }
  .site-title span { color: var(--accent); }
  .site-subtitle { font-size: 13px; color: var(--text3); font-family: sans-serif; margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .sync-status { font-family: sans-serif; font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; padding: 5px 0; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.err { background: var(--accent); }
  .sync-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 2rem; }
  @media(max-width:500px){ .stats-grid { grid-template-columns: repeat(2,1fr); } }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .stat-label { font-size: 11px; color: var(--text3); font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-value { font-size: 24px; font-weight: normal; color: var(--text); }
  .stat-value.accent { color: var(--accent); }
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .tab { font-family: sans-serif; font-size: 14px; padding: 10px 20px; cursor: pointer; border: none; background: none; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .filter-btn { font-family: sans-serif; font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .wine-list { display: flex; flex-direction: column; gap: 10px; }
  .wine-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .wine-card:hover { border-color: var(--border2); box-shadow: var(--shadow); }
  .wine-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
  .wine-row { display: flex; align-items: flex-start; gap: 12px; }
  .wine-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .wine-main { flex: 1; min-width: 0; }
  .wine-name { font-size: 16px; color: var(--text); }
  .wine-sub { font-size: 13px; color: var(--text2); font-family: sans-serif; margin-top: 2px; }
  .wine-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .badge { font-family: sans-serif; font-size: 11px; padding: 2px 8px; border-radius: 6px; border: 1px solid; white-space: nowrap; }
  .b-rosso { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); }
  .b-bianco { background: var(--amber-light); color: var(--amber); border-color: var(--amber); }
  .b-bollicine { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
  .b-rosato { background: var(--pink-light); color: var(--pink); border-color: var(--pink); }
  .b-dolce { background: var(--green-light); color: var(--green); border-color: var(--green); }
  .b-macerato { background: var(--purple-light); color: var(--purple); border-color: var(--purple); }
  .b-neutral { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
  .b-value { background: var(--green-light); color: var(--green); border-color: var(--green); }
  .window-bar { height: 5px; border-radius: 3px; background: var(--surface2); margin-top: 10px; overflow: hidden; }
  .window-fill { height: 100%; border-radius: 3px; }
  .w-good { background: var(--green); } .w-soon { background: var(--amber); } .w-past { background: var(--accent); }
  .window-label { font-family: sans-serif; font-size: 11px; color: var(--text3); margin-top: 4px; }
  .wine-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 6px; border-radius: 6px; font-size: 16px; line-height: 1; transition: all 0.15s; }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .icon-btn.del:hover { background: var(--accent-light); color: var(--accent); }
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text3); font-family: sans-serif; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 14px; line-height: 1.6; }
  .detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-top: 1rem; }
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .detail-title { font-size: 20px; }
  .detail-subtitle { font-family: sans-serif; font-size: 13px; color: var(--text2); margin-top: 4px; }
  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 1.5rem; margin-bottom: 1.25rem; }
  @media(max-width:480px){ .detail-grid { grid-template-columns: 1fr; } }
  .detail-field .label { font-family: sans-serif; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
  .detail-field .value { font-size: 14px; color: var(--text); font-family: sans-serif; }
  .detail-section { margin-bottom: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .detail-section-label { font-family: sans-serif; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .tags-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: var(--surface2); border-radius: 6px; padding: 4px 10px; font-family: sans-serif; font-size: 12px; color: var(--text2); }
  .detail-desc { font-family: sans-serif; font-size: 13px; color: var(--text2); line-height: 1.7; }
  .detail-window { margin-bottom: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
  .form-title { font-size: 18px; font-weight: normal; margin-bottom: 1.25rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:520px){ .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-family: sans-serif; font-size: 12px; color: var(--text2); }
  .form-group input, .form-group select, .form-group textarea { font-size: 14px; font-family: sans-serif; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); padding: 9px 12px; width: 100%; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .form-group textarea { resize: vertical; min-height: 72px; }
  .form-full { grid-column: 1 / -1; }
  .btn-row { display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }
  .btn { font-family: sans-serif; font-size: 13px; padding: 9px 18px; border-radius: var(--radius); cursor: pointer; display: inline-flex; align-items: center; gap: 7px; border: 1px solid; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary { background: transparent; color: var(--text); border-color: var(--border2); }
  .btn-secondary:hover { background: var(--surface2); }
  .btn-ghost { background: transparent; color: var(--text2); border-color: transparent; }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-warn { background: transparent; color: var(--amber); border-color: var(--amber); }
  .btn-warn:hover { background: var(--amber-light); }
  .btn-sm { font-size: 12px; padding: 6px 12px; }
  .ac-wrap { position: relative; }
  .ac-drop { position: absolute; top: calc(100% + 3px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); z-index: 100; overflow: hidden; box-shadow: var(--shadow-md); }
  .ac-item { padding: 8px 12px; font-family: sans-serif; font-size: 13px; cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .ac-item:hover { background: var(--surface2); }
  .ac-item .ac-badge { font-size: 10px; color: var(--accent); margin-left: auto; background: var(--accent-light); padding: 1px 6px; border-radius: 4px; }
  .ac-hl { font-weight: bold; color: var(--accent); }
  .ai-status { background: var(--surface2); border-radius: var(--radius); padding: 10px 14px; font-family: sans-serif; font-size: 13px; color: var(--text2); margin-top: 12px; display: flex; align-items: center; gap: 8px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast-wrap { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 16px; font-family: sans-serif; font-size: 13px; color: var(--text); box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 8px; animation: slideIn 0.2s ease; max-width: 300px; }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--accent); }
  @keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:none} }
  .edit-section { background: var(--surface2); border-radius: var(--radius); padding: 1.25rem; margin-top: 0.5rem; }
</style>
</head>
<body>

<div class="toast-wrap" id="toasts"></div>

<div class="app">
  <header class="site-header">
    <div>
      <h1 class="site-title">La mia <span>cantina</span></h1>
      <p class="site-subtitle">Cataloga · abbina · scopri il momento giusto</p>
    </div>
    <div class="header-actions">
      <div class="sync-status"><div class="sync-dot loading" id="sync-dot"></div><span id="sync-label">Connessione…</span></div>
      <button class="btn btn-secondary btn-sm" onclick="exportData()">↓ Esporta</button>
      <label class="btn btn-secondary btn-sm" style="cursor:pointer">↑ Importa<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
    </div>
  </header>

  <div class="stats-grid" id="stats"></div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('lista')">Cantina</button>
    <button class="tab" onclick="showTab('aggiungi')">Aggiungi vino</button>
  </div>

  <div id="tab-lista">
    <div class="filter-row" id="filters"></div>
    <div class="wine-list" id="wine-list"></div>
    <div id="detail-panel" style="display:none"></div>
  </div>

  <div id="tab-aggiungi" style="display:none">
    <div class="form-card">
      <h2 class="form-title">Nuovo vino</h2>
      <div class="form-grid">
        <div class="form-group"><label>Nome vino *</label><input id="f-nome" type="text" placeholder="es. Barolo Cascina Francia"></div>
        <div class="form-group"><label>Produttore *</label>
          <div class="ac-wrap"><input id="f-prod" type="text" placeholder="es. Giacomo Conterno" autocomplete="off" oninput="acShow('f-prod','f-prod-d','produttori')">
          <div id="f-prod-d" class="ac-drop" style="display:none"></div></div>
        </div>
        <div class="form-group"><label>Annata *</label><input id="f-annata" type="number" placeholder="es. 2019" min="1900" max="2026"></div>
        <div class="form-group"><label>Tipologia</label>
          <select id="f-tipo">
            <option value="rosso">Rosso</option><option value="bianco">Bianco</option>
            <option value="bollicine">Bollicine</option><option value="rosato">Rosato</option>
            <option value="macerato">Macerato / Orange wine</option><option value="dolce">Dolce / Passito</option>
          </select>
        </div>
        <div class="form-group"><label>Regione / Denominazione</label>
          <div class="ac-wrap"><input id="f-regione" type="text" placeholder="es. Barolo DOCG, Piemonte" autocomplete="off" oninput="acShow('f-regione','f-regione-d','regioni')">
          <div id="f-regione-d" class="ac-drop" style="display:none"></div></div>
        </div>
        <div class="form-group"><label>Vitigno / Uvaggio</label>
          <div class="ac-wrap"><input id="f-vitigno" type="text" placeholder="es. Nebbiolo" autocomplete="off" oninput="acShow('f-vitigno','f-vitigno-d','vitigni')">
          <div id="f-vitigno-d" class="ac-drop" style="display:none"></div></div>
        </div>
        <div class="form-group"><label>Numero bottiglie</label><input id="f-bottiglie" type="number" placeholder="6" min="1"></div>
        <div class="form-group"><label>Prezzo acquisto (€/bottiglia)</label><input id="f-prezzo" type="number" placeholder="45.00" step="0.01"></div>
        <div class="form-group"><label>Punteggio critica (opz.)</label><input id="f-punti" type="number" placeholder="95" min="50" max="100"></div>
        <div class="form-group form-full"><label>Note personali</label><textarea id="f-note" placeholder="Impressioni, occasione d'acquisto…"></textarea></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="aggiungiVino()">✨ Analizza e aggiungi</button>
        <button class="btn btn-secondary" onclick="aggiungiDemo()">📁 Carica cantina demo</button>
      </div>
      <div id="ai-status" style="display:none" class="ai-status">
        <div class="spinner"></div><span id="ai-status-msg">Analisi sommelier AI in corso…</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── Configurazione Supabase ───────────────────────────────
const SB_URL = 'https://txvavajiavjjkgwrfdtw.supabase.co';
const SB_KEY = 'sb_publishable_-szpEdr8zgR-8wiuciKrhw_qluaqy65';
const SB_HEADERS = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
const ROW_ID = 'default'; // unica riga che contiene tutta la cantina

// ── Stato ─────────────────────────────────────────────────
let wines = [];
let filterTipo = 'tutti';
let selectedId = null;
let editingId = null;
const CURRENT_YEAR = 2026;

const TIPI = [
  {v:'rosso',l:'Rosso'},{v:'bianco',l:'Bianco'},{v:'bollicine',l:'Bollicine'},
  {v:'rosato',l:'Rosato'},{v:'macerato',l:'Macerato / Orange wine'},{v:'dolce',l:'Dolce / Passito'},
];
const VITIGNI_BASE = ['Nebbiolo','Sangiovese','Barbera','Dolcetto','Montepulciano','Aglianico',
  'Nero d\'Avola','Primitivo','Cannonau','Corvina','Rondinella','Cabernet Sauvignon','Merlot',
  'Syrah','Pinot Nero','Grenache','Trebbiano','Vermentino','Pinot Grigio','Chardonnay',
  'Sauvignon Blanc','Verdicchio','Fiano','Greco','Falanghina','Garganega','Ribolla Gialla',
  'Friulano','Malvasia','Moscato','Zibibbo','Glera','Nerello Mascalese','Timorasso','Nascetta',
  'Pecorino','Passerina','Riesling','Gewürztraminer','Lagrein','Teroldego','Refosco','Pignolo'];

// ── Supabase CRUD ─────────────────────────────────────────
function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (dot) { dot.className = 'sync-dot ' + state; }
  if (lbl) lbl.textContent = label;
}

async function sbLoad() {
  setSyncStatus('loading', 'Caricamento…');
  try {
    const r = await fetch(`${SB_URL}/rest/v1/wines?id=eq.${ROW_ID}&select=data`, { headers: SB_HEADERS });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const rows = await r.json();
    if (rows.length > 0 && rows[0].data) {
      wines = Array.isArray(rows[0].data) ? rows[0].data : [];
    } else {
      // Prova migrazione da localStorage
      const local = localStorage.getItem('cantina_v1') || localStorage.getItem('cantina_wines');
      if (local) { wines = JSON.parse(local); await sbSave(); }
    }
    setSyncStatus('ok', 'Sincronizzato');
  } catch(e) {
    setSyncStatus('err', 'Offline — dati locali');
    toast('Impossibile connettersi a Supabase. Uso dati locali.', 'error');
    const local = localStorage.getItem('cantina_v1') || localStorage.getItem('cantina_wines');
    if (local) { try { wines = JSON.parse(local); } catch(e){} }
  }
}

async function sbSave() {
  setSyncStatus('loading', 'Salvataggio…');
  // Salva anche in locale come backup
  try { localStorage.setItem('cantina_v1', JSON.stringify(wines)); } catch(e){}
  try {
    const r = await fetch(`${SB_URL}/rest/v1/wines`, {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ id: ROW_ID, data: wines })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    setSyncStatus('ok', 'Sincronizzato');
  } catch(e) {
    setSyncStatus('err', 'Errore salvataggio');
    toast('Errore nel salvataggio online. Dati salvati in locale.', 'error');
  }
}

// ── Export / Import ───────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(wines, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cantina_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Cantina esportata', 'success');
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      const ids = new Set(wines.map(w=>w.id));
      const nuovi = data.filter(w=>!ids.has(w.id));
      wines = [...wines, ...nuovi];
      await sbSave(); renderAll();
      toast(`Importati ${nuovi.length} vini`, 'success');
    } catch { toast('File non valido', 'error'); }
    e.target.value = '';
  };
  r.readAsText(file);
}

// ── Autocomplete ──────────────────────────────────────────
function acSources() {
  return {
    produttori: [...new Set(wines.map(w=>w.produttore).filter(Boolean))],
    regioni:    [...new Set(wines.map(w=>w.regione).filter(Boolean))],
    vitigni:    [...new Set([...wines.map(w=>w.vitigno).filter(Boolean), ...VITIGNI_BASE])],
  };
}
function acShow(inputId, dropId, sourceKey) {
  const val = document.getElementById(inputId)?.value?.trim()||'';
  const drop = document.getElementById(dropId); if(!drop) return;
  if (val.length < 1) { drop.style.display='none'; return; }
  const src = acSources();
  const fromCantina = new Set(wines.map(w=>({produttori:w.produttore,regioni:w.regione,vitigni:w.vitigno}[sourceKey])).filter(Boolean));
  const matches = (src[sourceKey]||[])
    .filter(v=>v.toLowerCase().includes(val.toLowerCase()))
    .sort((a,b)=>{ const ai=fromCantina.has(a),bi=fromCantina.has(b); return ai===bi?a.localeCompare(b,'it'):ai?-1:1; })
    .slice(0,6);
  if (!matches.length) { drop.style.display='none'; return; }
  drop.style.display='block';
  drop.innerHTML = matches.map(m=>{
    const inC=fromCantina.has(m), idx=m.toLowerCase().indexOf(val.toLowerCase());
    const hl=idx>=0?m.slice(0,idx)+`<span class="ac-hl">${m.slice(idx,idx+val.length)}</span>`+m.slice(idx+val.length):m;
    return `<div class="ac-item" onmousedown="acPick('${inputId}','${dropId}','${m.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${hl}${inC?'<span class="ac-badge">cantina</span>':''}</div>`;
  }).join('');
}
function acPick(inputId, dropId, val) {
  const el=document.getElementById(inputId); if(el) el.value=val;
  const drop=document.getElementById(dropId); if(drop) drop.style.display='none';
}
document.addEventListener('click', e=>{ if(!e.target.closest('.ac-wrap')) document.querySelectorAll('.ac-drop').forEach(el=>el.style.display='none'); });

// ── Helpers ───────────────────────────────────────────────
function tipoBadge(t){return{rosso:'b-rosso',bianco:'b-bianco',bollicine:'b-bollicine',rosato:'b-rosato',dolce:'b-dolce',macerato:'b-macerato'}[t]||'b-neutral';}
function tipoColor(t){return{rosso:'#7B2D2D',bianco:'#7A4F0E',bollicine:'#1A4A7A',rosato:'#7A2A4A',dolce:'#2D5A3D',macerato:'#4A3580'}[t]||'#888';}
function tipoLabel(t){return TIPI.find(x=>x.v===t)?.l||t;}
function tipiOptions(sel){return TIPI.map(t=>`<option value="${t.v}"${sel===t.v?' selected':''}>${t.l}</option>`).join('');}
function winStatus(w) {
  if(!w.ai) return null;
  const {drinkFrom:df,drinkTo:dt}=w.ai,y=CURRENT_YEAR;
  if(y<df) return{label:`Apice dal ${df}`,pct:Math.min(95,(y-w.annata)/(df-w.annata+0.01)*80),cls:'w-soon'};
  if(y>dt) return{label:'Apice superato',pct:100,cls:'w-past'};
  return{label:`Ottimo ora · fino al ${dt}`,pct:Math.min(95,(y-df)/(dt-df+0.01)*100+5),cls:'w-good'};
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function buildPrompt(w){return `Vino: ${w.nome} - Produttore: ${w.produttore} - Annata: ${w.annata} - Tipo: ${w.tipo}${w.vitigno?' - Vitigno: '+w.vitigno:''}${w.regione?' - Regione/DOC: '+w.regione:''}${w.punti?' - Punteggio: '+w.punti+'/100':''}${w.prezzo?' - Prezzo acquisto: €'+w.prezzo:''}. Anno corrente: ${CURRENT_YEAR}.`;}

// ── Toast ─────────────────────────────────────────────────
function toast(msg, type='success') {
  const wrap=document.getElementById('toasts');
  const el=document.createElement('div'); el.className=`toast ${type}`;
  el.innerHTML=(type==='success'?'✓ ':'✕ ')+esc(msg);
  wrap.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(16px)';el.style.transition='all 0.3s';setTimeout(()=>el.remove(),300);},3000);
}

// ── Render ────────────────────────────────────────────────
function renderStats() {
  const bottles=wines.reduce((s,w)=>s+(w.bottiglie||1),0);
  const value=wines.reduce((s,w)=>s+(w.ai?.estimatedValue||w.prezzo||0)*(w.bottiglie||1),0);
  const ready=wines.filter(w=>w.ai&&CURRENT_YEAR>=w.ai.drinkFrom&&CURRENT_YEAR<=w.ai.drinkTo).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Etichette</div><div class="stat-value">${wines.length}</div></div>
    <div class="stat"><div class="stat-label">Bottiglie</div><div class="stat-value">${bottles}</div></div>
    <div class="stat"><div class="stat-label">Pronte ora</div><div class="stat-value accent">${ready}</div></div>
    <div class="stat"><div class="stat-label">Valore stimato</div><div class="stat-value">€${value.toLocaleString('it-IT',{maximumFractionDigits:0})}</div></div>`;
}
function renderFilters() {
  const tipi=['tutti',...new Set(wines.map(w=>w.tipo))];
  document.getElementById('filters').innerHTML=tipi.map(t=>
    `<button class="filter-btn ${filterTipo===t?'active':''}" onclick="setFilter('${esc(t)}')">${t==='tutti'?'Tutti':esc(tipoLabel(t))}</button>`
  ).join('');
}
function setFilter(t){filterTipo=t;renderFilters();renderList();}
function renderList() {
  const list=wines.filter(w=>filterTipo==='tutti'||w.tipo===filterTipo);
  const el=document.getElementById('wine-list');
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><div class="icon">🍾</div><p>Nessun vino in cantina.<br>Aggiungine uno dalla scheda "Aggiungi vino"<br>oppure carica la <strong>cantina demo</strong>.</p></div>`;
    return;
  }
  el.innerHTML=list.map(w=>{
    const ws=winStatus(w),sel=w.id===selectedId;
    return `<div class="wine-card${sel?' selected':''}" onclick="selectWine('${esc(w.id)}')">
      <div class="wine-row">
        <div class="wine-dot" style="background:${tipoColor(w.tipo)}"></div>
        <div class="wine-main">
          <div class="wine-name">${esc(w.nome)} ${w.annata}</div>
          <div class="wine-sub">${esc(w.produttore)}${w.regione?' · '+esc(w.regione):''}</div>
          <div class="wine-meta">
            <span class="badge ${tipoBadge(w.tipo)}">${esc(tipoLabel(w.tipo))}</span>
            ${w.vitigno?`<span class="badge b-neutral">🌿 ${esc(w.vitigno)}</span>`:''}
            <span class="badge b-neutral">🍾 ${w.bottiglie||1} bott.</span>
            ${w.prezzo?`<span class="badge b-neutral">€${w.prezzo}/bott.</span>`:''}
            ${w.ai?.estimatedValue&&w.ai.estimatedValue!==w.prezzo?`<span class="badge b-value">~€${w.ai.estimatedValue} mercato</span>`:''}
          </div>
          ${ws?`<div class="window-bar"><div class="window-fill ${ws.cls}" style="width:${Math.round(ws.pct)}%"></div></div><div class="window-label">${ws.label}</div>`:''}
        </div>
        <div class="wine-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" onclick="startEdit('${esc(w.id)}')" title="Modifica">✏️</button>
          <button class="icon-btn del" onclick="deleteWine('${esc(w.id)}')" title="Elimina">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function renderAll(){renderStats();renderFilters();renderList();}

// ── Detail ────────────────────────────────────────────────

  selectedId=id; renderList();
  const w=wines.find(x=>x.id===id); if(!w) return;
  const ws=winStatus(w);
  panel.style.display='block';
  panel.innerHTML=`<div class="detail-panel">
    <div class="detail-header">
      <div><div class="detail-title">${esc(w.nome)} ${w.annata}</div>
      <div class="detail-subtitle">${esc(w.produttore)}${w.regione?' · '+esc(w.regione):''}</div></div>
      <div class="detail-actions">
        <button class="btn btn-secondary btn-sm" onclick="startEdit('${esc(id)}')">✏️ Modifica</button>
        <button class="btn btn-secondary btn-sm" onclick="askAI('${esc(id)}')">✨ Approfondisci</button>
      </div>
    </div>
    <div class="detail-grid">
      <div class="detail-field"><div class="label">Tipologia</div><div class="value"><span class="badge ${tipoBadge(w.tipo)}">${esc(tipoLabel(w.tipo))}</span></div></div>
      ${w.vitigno?`<div class="detail-field"><div class="label">Vitigno / Uvaggio</div><div class="value">🌿 ${esc(w.vitigno)}</div></div>`:''}
      <div class="detail-field"><div class="label">Annata</div><div class="value">${w.annata}</div></div>
      <div class="detail-field"><div class="label">Bottiglie in cantina</div><div class="value">${w.bottiglie||1}</div></div>
      ${w.prezzo?`<div class="detail-field"><div class="label">Prezzo acquisto</div><div class="value">€${w.prezzo} / bottiglia</div></div>`:''}
      ${w.ai?.estimatedValue?`<div class="detail-field"><div class="label">Valore stimato</div><div class="value" style="color:var(--green);font-weight:bold">~ €${w.ai.estimatedValue} / bottiglia</div></div>`:''}
      ${w.punti?`<div class="detail-field"><div class="label">Punteggio critica</div><div class="value">${w.punti} / 100</div></div>`:''}
      ${w.ai?.temperatura?`<div class="detail-field"><div class="label">Temperatura di servizio</div><div class="value">${esc(w.ai.temperatura)}</div></div>`:''}
    </div>
    ${ws?`<div class="detail-window">
      <div class="detail-section-label">Finestra di consumo${w.ai?.drinkFrom?' · '+w.ai.drinkFrom+'–'+w.ai.drinkTo:''}</div>
      <div class="window-bar" style="height:8px"><div class="window-fill ${ws.cls}" style="width:${Math.round(ws.pct)}%"></div></div>
      <div class="window-label" style="margin-top:6px">${ws.label}</div>
    </div>`:''}
    ${w.ai?.abbinamenti?.length?`<div class="detail-section">
      <div class="detail-section-label">Abbinamenti consigliati</div>
      <div class="tags-list">${w.ai.abbinamenti.map(a=>`<span class="tag">${esc(a)}</span>`).join('')}</div>
    </div>`:''}
    ${w.ai?.descrizione?`<div class="detail-section">
      <div class="detail-section-label">Note di degustazione</div>
      <div class="detail-desc">${esc(w.ai.descrizione)}</div>
    </div>`:''}
    ${w.note?`<div class="detail-section">
      <div class="detail-section-label">Note personali</div>
      <div class="detail-desc">${esc(w.note)}</div>
    </div>`:''}
  </div>`;
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── Edit ──────────────────────────────────────────────────

  const w=wines.find(x=>x.id===id); if(!w) return;
  selectedId=id; editingId=id; renderList();
  const panel=document.getElementById('detail-panel');
  panel.style.display='block';
  panel.innerHTML=`<div class="detail-panel">
    <div class="detail-header" style="margin-bottom:0.75rem;padding-bottom:0.75rem">
      <div class="detail-title" style="font-size:17px">✏️ Modifica — ${esc(w.nome)} ${w.annata}</div>
    </div>
    <div class="edit-section">
      <div class="form-grid">
        <div class="form-group"><label>Nome vino</label><input id="e-nome" type="text" value="${esc(w.nome)}"></div>
        <div class="form-group"><label>Produttore</label>
          <div class="ac-wrap"><input id="e-prod" type="text" value="${esc(w.produttore)}" autocomplete="off" oninput="acShow('e-prod','e-prod-d','produttori')">

        </div>
        <div class="form-group"><label>Vitigno / Uvaggio</label>

          <div id="e-vitigno-d" class="ac-drop" style="display:none"></div></div>
        </div>
        <div class="form-group"><label>Bottiglie in cantina</label><input id="e-bottiglie" type="number" value="${w.bottiglie||1}" min="0"></div>
        <div class="form-group"><label>Prezzo acquisto (€/bott.)</label><input id="e-prezzo" type="number" value="${w.prezzo||''}" step="0.01"></div>
        <div class="form-group"><label>Punteggio critica</label><input id="e-punti" type="number" value="${w.punti||''}" min="50" max="100"></div>

      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveEdit('${esc(id)}')">✓ Salva modifiche</button>

      <div id="edit-ai-status" style="display:none" class="ai-status">

      </div>

function getEditVals(p) {
  return {
    nome: document.getElementById(`${p}-nome`)?.value?.trim()||'',
    produttore: document.getElementById(`${p}-prod`)?.value?.trim()||'',
    annata: parseInt(document.getElementById(`${p}-annata`)?.value)||0,
    tipo: document.getElementById(`${p}-tipo`)?.value||'rosso',
    regione: document.getElementById(`${p}-regione`)?.value?.trim()||'',
    vitigno: document.getElementById(`${p}-vitigno`)?.value?.trim()||'',
    bottiglie: parseInt(document.getElementById(`${p}-bottiglie`)?.value)||1,
    prezzo: parseFloat(document.getElementById(`${p}-prezzo`)?.value)||null,
    punti: parseInt(document.getElementById(`${p}-punti`)?.value)||null,
    note: document.getElementById(`${p}-note`)?.value?.trim()||'',
  };
}

async function saveEdit(id) {
  const idx=wines.findIndex(x=>x.id===id); if(idx<0) return;
  const v=getEditVals('e');
  if(!v.nome||!v.produttore||!v.annata){alert('Nome, produttore e annata sono obbligatori.');return;}
  wines[idx]={...wines[idx],...v};
  editingId=null; await sbSave(); renderAll(); toast('Modifiche salvate'); selectWine(id);
}

async function saveAndReanalyze(id) {
  const idx=wines.findIndex(x=>x.id===id); if(idx<0) return;
  const v=getEditVals('e');
  if(!v.nome||!v.produttore||!v.annata){alert('Nome, produttore e annata sono obbligatori.');return;}
  wines[idx]={...wines[idx],...v};
  const w=wines[idx];
  const statusEl=document.getElementById('edit-ai-status');
  if(statusEl) statusEl.style.display='flex';
  try { w.ai=await callClaude(buildPrompt(w)); toast('Analisi aggiornata','success'); }
  catch(e){ toast('Salvato, analisi AI non aggiornata','error'); }
  editingId=null; await sbSave(); renderAll();
  setTimeout(()=>selectWine(id),100);
}

function cancelEdit(){
  editingId=null; document.getElementById('detail-panel').style.display='none'; selectedId=null; renderList();
}

async function deleteWine(id) {
  const w=wines.find(x=>x.id===id);
  if(!confirm(`Eliminare "${w?.nome}" dalla cantina?`)) return;
  wines=wines.filter(x=>x.id!==id);
  if(selectedId===id){selectedId=null;document.getElementById('detail-panel').style.display='none';}
  await sbSave(); renderAll(); toast('Vino eliminato');
}

function askAI(id){
  const w=wines.find(x=>x.id===id);
  if(w) alert(`Apri Claude.ai e chiedi:\n\n"Parlami del ${w.nome} ${w.annata} di ${w.produttore}${w.vitigno?' ('+w.vitigno+')':''}: storia, caratteristiche organolettiche, evoluzione e quando aprirlo."`);
}

// ── Claude API ────────────────────────────────────────────
async function callClaude(prompt) {
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514', max_tokens:1000,
      system:`Sei un sommelier esperto. Rispondi SOLO con un oggetto JSON valido, senza markdown, senza backtick, senza testo aggiuntivo.
Struttura: {"drinkFrom":<anno intero>,"drinkTo":<anno intero>,"abbinamenti":[<5-7 stringhe brevi in italiano>],"temperatura":"<es. 16-18°C>","descrizione":"<2-3 frasi>","estimatedValue":<intero €>}`,
      messages:[{role:'user',content:prompt}]
    })
  });
  if(!resp.ok) throw new Error('API error');
  const data=await resp.json();
  const text=data.content?.map(i=>i.text||'').join('')||'';
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

// ── Aggiungi vino ─────────────────────────────────────────
async function aggiungiVino() {
  const nome=document.getElementById('f-nome').value.trim();
  const prod=document.getElementById('f-prod').value.trim();
  const annata=parseInt(document.getElementById('f-annata').value);
  if(!nome||!prod||!annata){alert('Compila almeno nome, produttore e annata.');return;}
  const wine={
    id: Date.now().toString(),
    nome, produttore:prod, annata,
    tipo: document.getElementById('f-tipo').value,
    regione: document.getElementById('f-regione').value.trim(),
    vitigno: document.getElementById('f-vitigno').value.trim(),
    bottiglie: parseInt(document.getElementById('f-bottiglie').value)||1,
    prezzo: parseFloat(document.getElementById('f-prezzo').value)||null,
    punti: parseInt(document.getElementById('f-punti').value)||null,
    note: document.getElementById('f-note').value.trim(),
    ai: null
  };
  const statusEl=document.getElementById('ai-status'), statusMsg=document.getElementById('ai-status-msg');
  statusEl.style.display='flex'; statusMsg.textContent='Analisi sommelier AI in corso…';
  try {
    wine.ai=await callClaude(buildPrompt(wine));
    statusMsg.textContent='Analisi completata!';
    setTimeout(()=>{statusEl.style.display='none';},2000);
  } catch(e) {
    statusMsg.textContent='Aggiunto senza analisi AI.';
    setTimeout(()=>{statusEl.style.display='none';},3000);
  }
  wines.push(wine); await sbSave();
  ['f-nome','f-prod','f-annata','f-regione','f-vitigno','f-bottiglie','f-prezzo','f-punti','f-note']
    .forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  showTab('lista'); renderAll();
  toast(`${wine.nome} ${wine.annata} aggiunto`,'success');
  setTimeout(()=>selectWine(wine.id),150);
}

// ── Tab ───────────────────────────────────────────────────
function showTab(t){
  document.getElementById('tab-lista').style.display=t==='lista'?'block':'none';
  document.getElementById('tab-aggiungi').style.display=t==='aggiungi'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='lista')||(i===1&&t==='aggiungi')));
}

// ── Init ──────────────────────────────────────────────────
sbLoad().then(()=>{
  renderAll();
  if(wines.length>0) toast(`${wines.length} etichett${wines.length===1?'a':'e'} caricate`,'success');
});
